config:
  target: "http://localhost:3000"
  phases:
    - duration: 5
      arrivalRate: 100
      name: "High concurrency spike"
scenarios:
  - name: "Concurrent Booking of Same Seat"
    flow:
      - post:
          url: "/api/book/naive"
          json:
            userId: "{{ $randomNumber(1, 3) }}"
            trainId: 1
            seatId: 1
          expect:
            - statusCode: 200
            - statusCode: 400
