config:
  target: "http://localhost:3000"
  phases:
    - duration: 5
      arrivalRate: 200
      name: "High concurrency spike"
scenarios:
  - name: "Concurrent Booking of Same Seat"
    flow:
      - post:
          url: "/api/book/db-lock"
          json:
            userId: "{{ $randomNumber(1, 3) }}"
            trainId: 1
            seatId: 4
          expect:
            - statusCode: 200
            - statusCode: 400
